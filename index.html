<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التبرع لأجل لابتوب</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;}
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; width: 100%; }
        
        /* القسم الأيمن: معلومات الحملة */
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); flex: 1; min-width: 300px; max-width: 450px; text-align: center; }
        .product-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 10px; margin-bottom: 15px; }
        h2 { color: #2c3e50; margin-top: 0; }
        .target-amount { font-size: 20px; color: #16a085; font-weight: bold; margin-bottom: 10px; }
        .progress-container { background: #e0e0e0; border-radius: 20px; height: 25px; width: 100%; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: #1abc9c; height: 100%; width: 0%; transition: width 0.8s ease-in-out; border-radius: 20px; }
        .main-stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1em; color: #555; margin-bottom: 10px; }
        .sub-stats { color: #888; margin-bottom: 15px; font-size: 0.9em; }
        
        /* القسم الأيسر: المتبرعون */
        .donors-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); flex: 1.5; min-width: 350px; }
        .donors-card h3 { text-align: center; color: #2c3e50; margin-top: 0; border-bottom: 2px solid #1abc9c; padding-bottom: 10px; }
        #donor-count-text { color: #16a085; font-weight: bold; }
        
        #donor-list { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; }
        .donor-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .donor-item:last-child { border-bottom: none; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background-color: #f1f4f8; border: 2px solid #e0e0e0; padding: 2px; object-fit: cover;}
        .donor-info { flex-grow: 1; }
        .donor-name { font-weight: bold; color: #333; }
        .donor-amount { font-weight: bold; color: #16a085; font-size: 1.2em;}
        .donation-time { color: #999; font-size: 0.8em; margin-top: 2px; }

        /* الأزرار للمحاكاة */
        .control-btns { display: flex; justify-content: center; gap: 10px; margin-top: 20px; width: 100%; }
        .btn { background: #16a085; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn-reset { background: #e74c3c; }

    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=600&auto=format&fit=crop" alt="لابتوب" class="product-img">
        <h2>تأمين لابتوب دراسي</h2>
        <div class="target-amount">المبلغ المطلوب: <span id="target-ui">1500</span>$</div>
        
        <div class="progress-container">
            <div id="myBar" class="progress-bar"></div>
        </div>

        <div class="main-stats">
            <span>المجموع: <span id="current">0</span>$</span>
        </div>
        <div class="sub-stats">
            <span>المتبقي: <span id="remaining">1500</span>$</span>
        </div>
    </div>

    <div class="donors-card">
        <h3>المتبرعون <span id="donor-count">(<span id="donor-count-text">0</span>)</span></h3>
        <ul id="donor-list">
            </ul>
    </div>
</div>

<div class="control-btns">
    <button class="btn" onclick="addFakeDonation(100)">محاكاة تبرع بـ 100$</button>
    <button class="btn" onclick="addFakeDonation(25)">محاكاة تبرع بـ 25$</button>
    <button class="btn btn-reset" onclick="resetDonations()">تصفير الحملة</button>
</div>

<script>
    // إعدادات الحملة - يمكنكِ تغيير الأرقام من هنا
    const donationData = {
        target: 1500, // المبلغ المستهدف
        current: 0,   // المبلغ الحالي
        donors: []    // قائمة المتبرعين (تخزين محلي مؤقت)
    };

    // صورة افتراضية للمتبرع (يمكن تغيير الرابط)
    const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    // وظيفة لتحديث واجهة المستخدم (العداد والأرقام)
    function updateUI() {
        const percent = (donationData.current / donationData.target) * 100;
        const boundedPercent = Math.min(100, percent); // لا تتجاوز 100%

        // تحديث شريط التقدم والأرقام
        document.getElementById("myBar").style.width = boundedPercent + "%";
        document.getElementById("current").innerText = donationData.current.toLocaleString();
        document.getElementById("remaining").innerText = (donationData.target - donationData.current).toLocaleString();
        document.getElementById("target-ui").innerText = donationData.target.toLocaleString();
        
        // تحديث عدد المتبرعين
        const donorCount = donationData.donors.length;
        document.getElementById("donor-count-text").innerText = donorCount;
        
        updateDonorList();
    }

    // وظيفة لتحديث قائمة المتبرعين في الواجهة
    function updateDonorList() {
        const list = document.getElementById("donor-list");
        list.innerHTML = ""; // مسح القائمة الحالية لضبط الترتيب

        // عرض المتبرعين من الأحدث إلى الأقدم
        [...donationData.donors].reverse().forEach(donor => {
            const donorItem = document.createElement("li");
            donorItem.classList.add("donor-item");

            donorItem.innerHTML = `
                <img src="${defaultAvatar}" alt="تبرع مجهول" class="avatar">
                <div class="donor-info">
                    <span class="donor-name">فاعل خير</span>
                    <div class="donation-time">${donor.time}</div>
                </div>
                <div class="donor-amount">${donor.amount}$</div>
            `;
            list.appendChild(donorItem);
        });
    }

    // وظيفة لمحاكاة التبرع (تستخدمها الأزرار المؤقتة)
    function addFakeDonation(amount) {
        if (donationData.current >= donationData.target) {
            alert("شكراً! لقد تم الوصول للهدف المطلوب!");
            return;
        }

        const donationTime = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        
        donationData.current += amount;
        
        // إضافة المتبرع للقائمة
        donationData.donors.push({
            amount: amount,
            time: donationTime
        });

        // تشغيل صوت بسيط عند التبرع (اختياري)
        // new Audio('https://www.soundjay.com/buttons/button-10.mp3').play();

        updateUI();
    }

    // تصفير الحملة (للتجربة)
    function resetDonations() {
        donationData.current = 0;
        donationData.donors = [];
        updateUI();
    }

    // تشغيل التحديث الأولي
    updateUI();

</script>

</body>
</html>
